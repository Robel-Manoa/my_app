# SonarCloud Configuration for Full-Stack Application

# Path to sources
sonar.sources=front/src,back/src

# Path to tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.test.js,**/*.test.jsx

# Source encoding
sonar.sourceEncoding=UTF-8

# Exclusions for copy-paste detection
sonar.cpd.exclusions=**/node_modules/**,**/test/**,**/spec/**,**/vendor/**,**/dist/**,**/build/**

# Coverage reports for JavaScript/TypeScript
sonar.javascript.lcov.reportPaths=front/coverage/lcov.info
sonar.typescript.lcov.reportPaths=back/coverage/lcov.info

# Duplication thresholds
sonar.duplications.fileSimilarityThreshold=80

# Quality Gate
sonar.qualitygate.wait=false