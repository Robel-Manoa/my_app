services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    depends_on:
      - postgres
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgres://portal:portal@postgres:5432/portal

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001/api

  frontend-employee:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - '3002:3000'
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:3001/api

volumes:
  pgdata:
