# SonarQube Project Configuration for Full-Stack Application

# Project Identification
sonar.projectKey=Robel-Manoa_my-app
sonar.organization=robel-manoa
sonar.projectName=my-app
sonar.projectVersion=0.1.0

# Encoding
sonar.sourceEncoding=UTF-8

# Main source directories (Front-end React + Back-end TypeScript)
sonar.sources=front/src,back/src

# Test directories
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage reports (LCOV format)
sonar.javascript.lcov.reportPaths=front/coverage/lcov.info
sonar.typescript.lcov.reportPaths=back/coverage/lcov.info

# Test results reports
sonar.testExecutionReportFilePath=front/test-results.xml

# Exclusions - Dependencies and build files
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.min.js,**/*.min.css,**/coverage/**

# JavaScript/TypeScript specific
sonar.javascript.exclusions=**/node_modules/**,**/dist/**,**/build/**
sonar.typescript.exclusions=**/node_modules/**,**/dist/**,**/build/**

# Copy-paste detection exclusions
sonar.cpd.exclusions=**/test/**,**/spec/**,**/vendor/**

# Duplication detection (in percentages)
sonar.duplications.skip=false
sonar.duplications.fileSimilarityThreshold=80

# Security and Code Quality Rules
sonar.qualitygate.wait=true